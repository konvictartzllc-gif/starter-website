<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="api-base-url" content="" />
  <title>Konvict Artz Store</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Konvict Artz Store</h1>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/services.html">Services</a>
      <a href="/store.html">Store</a>
      <a href="/portfolio.html">Work Portfolio</a>
      <a href="/index.html#dex">Dex AI</a>
      <a href="/index.html#admin">Admin</a>
    </nav>
  </header>

  <section class="store-page-section">
    <div class="store-toolbar card">
      <div>
        <h2>Inventory</h2>
        <p id="storeMode" class="meta">Customer mode: browse available items and pricing.</p>
      </div>
      <div class="store-filter-group">
        <button class="secondary" data-filter="all">All</button>
        <button class="secondary" data-filter="refurbished">Refurbished</button>
        <button class="secondary" data-filter="new">New</button>
      </div>
    </div>

    <div id="adminStorePanel" class="card hidden">
      <h3>Admin Inventory Control</h3>
      <p class="meta">Add products with condition, stock count, price, and image.</p>
      <input id="storeName" type="text" placeholder="Item name" />
      <input id="storePrice" type="number" step="0.01" min="0" placeholder="Price" />
      <input id="storeInventory" type="number" min="0" step="1" placeholder="Inventory count" />
      <select id="storeCondition">
        <option value="refurbished">Refurbished</option>
        <option value="new">New</option>
      </select>
      <input id="storeImage" type="text" placeholder="Image URL" />
      <div class="actions">
        <button id="storeAddBtn">Add Inventory Item</button>
      </div>
    </div>

    <div id="storeList" class="grid"></div>
    <p id="storeStatus" class="meta"></p>
  </section>

  <script type="module" src="store.js"></script>
</body>
</html>
