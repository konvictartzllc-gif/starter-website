services:
  - type: web
    name: konvict-artz
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm run start
    # Uncomment the disk block to persist the SQLite database across restarts.
    # Render free plan does not support disks; upgrade to a paid plan to enable.
    # disk:
    #   name: db-data
    #   mountPath: /var/data
    #   sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      # Set DB_PATH to /var/data/konvict_artz.db when using the disk above.
      # - key: DB_PATH
      #   value: /var/data/konvict_artz.db
      - key: CLIENT_ORIGIN
        sync: false          # e.g. https://konvict-artz.onrender.com
      - key: JWT_SECRET
        generateValue: true  # Render generates a secure random value
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: konvictartzllc@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: SENDER_EMAIL
        value: konvictartzllc@gmail.com
      - key: SENDER_NAME
        value: Konvict Artz
